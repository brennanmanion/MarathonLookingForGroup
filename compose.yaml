services:
  postgres:
    image: postgres:16-alpine
    container_name: marathon-lfg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marathon_lfg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marathon_lfg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
