openapi: 3.1.0
info:
  title: Marathon LFG API
  version: 0.2.0
  description: |
    Backend contract for the Marathon Looking For Group MVP.

    Browser/PWA notes:
    - Web auth starts with `POST /auth/bungie/start` using `redirectMode: web`.
    - Web callback sets the `mlfg_at`, `mlfg_rt`, and `mlfg_csrf` cookies.
    - Cookie-authenticated mutation requests must send `X-CSRF-Token` matching `mlfg_csrf`.
    - The browser shell is served from `/app`, but the shell routes themselves are not modeled as API operations here.
servers:
  - url: http://127.0.0.1:3000
    description: Local development
tags:
  - name: Auth
  - name: Me
  - name: Parties
paths:
  /health:
    get:
      tags: [Auth]
      summary: Health check
      responses:
        '200':
          description: Service is reachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /auth/bungie/start:
    post:
      tags: [Auth]
      summary: Start Bungie OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BungieStartRequest'
      responses:
        '200':
          description: Login transaction created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BungieStartResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'

  /auth/bungie/callback:
    get:
      tags: [Auth]
      summary: Bungie OAuth callback
      description: |
        Handles both native and web login completions.

        Web mode:
        - sets auth cookies
        - redirects to `/app/auth/callback/success` or `/app/auth/callback/error`

        Native mode:
        - redirects to the configured app handoff URL
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirects to the app completion route.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

  /auth/session:
    get:
      tags: [Auth]
      summary: Inspect current browser session
      security:
        - MlfgAccessCookie: []
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: Authenticated or unauthenticated session state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionState'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate the current app session
      description: |
        Supports two modes:
        - native/API clients send `refreshToken` in the JSON body
        - browser/PWA clients use the `mlfg_rt` cookie and `X-CSRF-Token`
      parameters:
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - MlfgAccessCookie: []
        - {}
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Session rotated.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AppSessionResponse'
                  - $ref: '#/components/schemas/CookieRefreshResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current app session
      description: |
        Supports two modes:
        - native/API clients send `refreshToken` in the JSON body
        - browser/PWA clients use the refresh cookie and `X-CSRF-Token`
      parameters:
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - MlfgAccessCookie: []
        - {}
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logout completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /me:
    get:
      tags: [Me]
      summary: Get current user bootstrap payload
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Authenticated user profile and PWA capability metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /me/bungie/resync:
    post:
      tags: [Me]
      summary: Refresh Bungie membership state
      parameters:
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Bungie identity and Marathon verification refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'

  /parties:
    get:
      tags: [Parties]
      summary: List visible parties
      security:
        - MlfgAccessCookie: []
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: Public parties plus viewer-visible private/cancelled parties.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PartySummary'
                required: [items]
    post:
      tags: [Parties]
      summary: Create a party
      parameters:
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePartyRequest'
      responses:
        '201':
          description: Party created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyCreateResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}:
    get:
      tags: [Parties]
      summary: Get party detail
      security:
        - MlfgAccessCookie: []
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/PartyId'
      responses:
        '200':
          description: Party detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyDetail'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Parties]
      summary: Edit a party
      description: Deferred for the current MVP.
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '501':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}/join:
    post:
      tags: [Parties]
      summary: Request to join a party
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinPartyRequest'
      responses:
        '200':
          description: Join request accepted or queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyJoinResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}/leave:
    post:
      tags: [Parties]
      summary: Leave a party
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Membership moved to `left`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyMutationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}/cancel:
    post:
      tags: [Parties]
      summary: Cancel a hosted party
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Party cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  partyId:
                    type: string
                    format: uuid
                  status:
                    $ref: '#/components/schemas/PartyStatus'
                required: [partyId, status]
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}/members/{memberId}/accept:
    post:
      tags: [Parties]
      summary: Accept a pending member
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/MemberId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Member accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyMutationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}/members/{memberId}/decline:
    post:
      tags: [Parties]
      summary: Decline a pending member
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/MemberId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Member declined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyMutationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /parties/{partyId}/members/{memberId}/kick:
    post:
      tags: [Parties]
      summary: Kick a pending or accepted member
      parameters:
        - $ref: '#/components/parameters/PartyId'
        - $ref: '#/components/parameters/MemberId'
        - $ref: '#/components/parameters/CsrfHeader'
      security:
        - BearerAuth: []
        - MlfgAccessCookie: []
      responses:
        '200':
          description: Member kicked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyMutationResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Native/mobile style bearer access token.
    MlfgAccessCookie:
      type: apiKey
      in: cookie
      name: mlfg_at
      description: Browser/PWA access-token cookie. Non-GET requests also need `X-CSRF-Token`.
  parameters:
    PartyId:
      name: partyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    CsrfHeader:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating mutation requests with browser cookies.
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    BungieStartRequest:
      type: object
      additionalProperties: false
      properties:
        redirectMode:
          type: string
          enum: [native, web]
        platform:
          type: string
          enum: [ios, android]
        appState:
          type: string
        returnTo:
          type: string
          description: Relative web route such as `/app` or `/app/parties`.
      required: [redirectMode]

    BungieStartResponse:
      type: object
      properties:
        loginId:
          type: string
          format: uuid
        authorizeUrl:
          type: string
          format: uri
      required: [loginId, authorizeUrl]

    RefreshRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
      description: Optional for browser cookie flow.

    AuthSessionState:
      oneOf:
        - type: object
          properties:
            authenticated:
              type: boolean
              const: false
          required: [authenticated]
        - type: object
          properties:
            authenticated:
              type: boolean
              const: true
            user:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
              required: [userId]
          required: [authenticated, user]

    AppSessionResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        refreshExpiresIn:
          type: integer
      required: [accessToken, refreshToken, expiresIn, refreshExpiresIn]

    CookieRefreshResponse:
      type: object
      properties:
        ok:
          type: boolean
        expiresIn:
          type: integer
        refreshExpiresIn:
          type: integer
      required: [ok, expiresIn, refreshExpiresIn]

    MeResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        profile:
          type: object
          properties:
            primaryDisplayName:
              type: string
            bungieDisplayName:
              type: [string, 'null']
            bungieGlobalDisplayName:
              type: [string, 'null']
            bungieGlobalDisplayNameCode:
              type: [integer, 'null']
          required: [primaryDisplayName, bungieDisplayName, bungieGlobalDisplayName, bungieGlobalDisplayNameCode]
        bungie:
          type: object
          properties:
            membershipId:
              type: [string, 'null']
            displayName:
              type: [string, 'null']
            globalDisplayName:
              type: [string, 'null']
            globalDisplayNameCode:
              type: [integer, 'null']
            verified:
              type: boolean
          required: [membershipId, displayName, globalDisplayName, globalDisplayNameCode, verified]
        marathon:
          type: object
          properties:
            membershipId:
              type: [string, 'null']
            verified:
              type: boolean
          required: [membershipId, verified]
        capabilities:
          type: object
          properties:
            canCreateParty:
              type: boolean
            canUsePwaPartyWrites:
              type: boolean
            canUsePwaBungieResync:
              type: boolean
          required: [canCreateParty, canUsePwaPartyWrites, canUsePwaBungieResync]
        pwa:
          type: object
          properties:
            appBasePath:
              type: string
            loginPath:
              type: string
            callbackSuccessPath:
              type: string
            callbackErrorPath:
              type: string
            sessionPath:
              type: string
            mePath:
              type: string
            resyncPath:
              type: string
            partiesPath:
              type: string
            cookieAuth:
              type: boolean
            csrfRequired:
              type: boolean
          required:
            - appBasePath
            - loginPath
            - callbackSuccessPath
            - callbackErrorPath
            - sessionPath
            - mePath
            - resyncPath
            - partiesPath
            - cookieAuth
            - csrfRequired
        lastMembershipSyncAt:
          type: [string, 'null']
      required: [userId, profile, bungie, marathon, capabilities, pwa, lastMembershipSyncAt]

    CreatePartyRequest:
      type: object
      additionalProperties: false
      required: [title, activityKey, maxSize]
      properties:
        title:
          type: string
        activityKey:
          type: string
        playlistKey:
          type: string
        platformKey:
          type: string
        regionKey:
          type: string
        languageKey:
          type: string
        voiceRequired:
          type: boolean
        ranked:
          type: boolean
        scheduledFor:
          type: string
        maxSize:
          type: integer
          minimum: 1
        approvalMode:
          type: string
        visibility:
          type: string
        requiresMarathonVerified:
          type: boolean
        requirementText:
          type: string
        description:
          type: string
        externalJoinUrl:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/PartyTag'

    PartyCreateResponse:
      type: object
      properties:
        partyId:
          type: string
          format: uuid
        status:
          type: string
        filledSlots:
          type: integer
        openSlots:
          type: integer
      required: [partyId, status, filledSlots, openSlots]

    JoinPartyRequest:
      type: object
      additionalProperties: false
      properties:
        noteToHost:
          type: string

    PartyJoinResponse:
      type: object
      properties:
        partyId:
          type: string
          format: uuid
        myStatus:
          $ref: '#/components/schemas/PartyMemberStatus'
        filledSlots:
          type: integer
        openSlots:
          type: integer
      required: [partyId, myStatus, filledSlots, openSlots]

    PartyMutationResponse:
      type: object
      properties:
        partyId:
          type: string
          format: uuid
        memberId:
          type: string
        memberStatus:
          $ref: '#/components/schemas/PartyMemberStatus'
        filledSlots:
          type: integer
        openSlots:
          type: integer
        partyStatus:
          type: string
      required: [partyId, memberId, memberStatus, filledSlots, openSlots, partyStatus]

    PartySummary:
      type: object
      properties:
        partyId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/PartyStatus'
        title:
          type: string
        activityKey:
          type: string
        playlistKey:
          type: [string, 'null']
        platformKey:
          type: string
        regionKey:
          type: [string, 'null']
        languageKey:
          type: [string, 'null']
        voiceRequired:
          type: boolean
        ranked:
          type: [boolean, 'null']
        scheduledFor:
          type: [string, 'null']
        maxSize:
          type: integer
        approvalMode:
          type: string
        visibility:
          type: string
        requiresMarathonVerified:
          type: boolean
        requirementText:
          type: [string, 'null']
        description:
          type: [string, 'null']
        externalJoinUrl:
          type: [string, 'null']
        filledSlots:
          type: integer
        openSlots:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        host:
          $ref: '#/components/schemas/PartyPerson'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/PartyTag'
        myMembership:
          oneOf:
            - $ref: '#/components/schemas/PartyMembershipSummary'
            - type: 'null'
        members:
          type: array
          items:
            $ref: '#/components/schemas/PartyMemberView'
      required:
        - partyId
        - status
        - title
        - activityKey
        - playlistKey
        - platformKey
        - regionKey
        - languageKey
        - voiceRequired
        - ranked
        - scheduledFor
        - maxSize
        - approvalMode
        - visibility
        - requiresMarathonVerified
        - requirementText
        - description
        - externalJoinUrl
        - filledSlots
        - openSlots
        - createdAt
        - updatedAt
        - host
        - tags
        - myMembership
        - members

    PartyDetail:
      allOf:
        - $ref: '#/components/schemas/PartySummary'

    PartyTag:
      type: object
      properties:
        tagKey:
          type: string
        tagValue:
          type: [string, 'null']
      required: [tagKey, tagValue]

    PartyPerson:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        bungieDisplayName:
          type: [string, 'null']
        globalDisplayName:
          type: [string, 'null']
        globalDisplayNameCode:
          type: [integer, 'null']
      required: [userId, bungieDisplayName, globalDisplayName, globalDisplayNameCode]

    PartyMembershipSummary:
      type: object
      properties:
        memberId:
          type: string
        status:
          $ref: '#/components/schemas/PartyMemberStatus'
        noteToHost:
          type: [string, 'null']
        joinedAt:
          type: [string, 'null']
        respondedAt:
          type: [string, 'null']
        createdAt:
          type: string
      required: [memberId, status, noteToHost, joinedAt, respondedAt, createdAt]

    PartyMemberView:
      type: object
      properties:
        memberId:
          type: string
        userId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/PartyMemberStatus'
        noteToHost:
          type: [string, 'null']
        joinedAt:
          type: [string, 'null']
        respondedAt:
          type: [string, 'null']
        createdAt:
          type: string
        bungieDisplayName:
          type: [string, 'null']
        globalDisplayName:
          type: [string, 'null']
        globalDisplayNameCode:
          type: [integer, 'null']
      required:
        - memberId
        - userId
        - status
        - noteToHost
        - joinedAt
        - respondedAt
        - createdAt
        - bungieDisplayName
        - globalDisplayName
        - globalDisplayNameCode

    PartyStatus:
      type: string
      enum: [open, full, in_progress, closed, cancelled]

    PartyMemberStatus:
      type: string
      enum: [accepted, pending, declined, left, kicked]
